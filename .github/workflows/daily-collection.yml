name: Daily Data Collection

on:
  schedule:
    - cron: '5 8 * * *'  # 08:05 UTC daily
  workflow_dispatch:  # Allow manual triggering
  push:
    branches:
      - main

jobs:
  collect-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync

      - name: Debug - Check if GEMINI_API_KEY is set
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "❌ GEMINI_API_KEY is NOT set"
            exit 1
          else
            echo "✓ GEMINI_API_KEY is set (length: ${#GEMINI_API_KEY} characters)"
          fi

      - name: Run data collection
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: uv run python scripts/run_collection.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/processed/metrics_latest.json
          git add data/processed/metrics_history.json
          git add data/stocks.db
          git add website/metrics_latest.json
          git diff --staged --quiet || git commit -m "data: automated daily collection $(date -u +%Y-%m-%d)

          🤖 Generated with [Claude Code](https://claude.com/claude-code)

          Co-Authored-By: Claude Opus 4.5 <noreply@anthropic.com>"
          git push
